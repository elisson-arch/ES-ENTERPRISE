<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta name="description" content="ES Enterprise - CRM Inteligente para Climatização">
  <title>ES Enterprise - CRM & AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Removing restrictive CSP if any was injected by server/helmet, adding basic structural styles -->
  <style>
    :root {
      --app-height: 100%;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-y: auto;
      background-color: #f8fafc;
    }

    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      /* Suporte a áreas seguras (notches) */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #root {
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    ::-webkit-scrollbar {
      width: 0.25rem;
      height: 0.25rem;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 0.625rem;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 0.25rem;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 0.625rem;
    }

    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }

    .animate-shimmer {
      background: linear-gradient(to right, #f1f5f9 4%, #e2e8f0 25%, #f1f5f9 36%);
      background-size: 1000px 100%;
      animation: shimmer 2s infinite linear;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
      50% { box-shadow: 0 0 20px 2px rgba(79, 70, 229, 0.3); }
    }

    .animate-pulse-glow {
      animation: pulse-glow 3s infinite ease-in-out;
    }
  </style>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
