steps:
  # Step 0: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/es-enterprise/$REPO_NAME:$COMMIT_SHA', 
      '.'
    ]

  # Step 1: Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/es-enterprise/$REPO_NAME:$COMMIT_SHA'
    ]

  # Step 2: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'es-enterprise',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/es-enterprise/$REPO_NAME:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/es-enterprise/$REPO_NAME:$COMMIT_SHA'

options:
  # Deixando o padrão do GCP decidir o melhor local para os logs enquanto a permissão é ajustada
  # logging: CLOUD_LOGGING_ONLY
