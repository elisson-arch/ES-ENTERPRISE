apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: es-enterprise
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: us-central1-docker.pkg.dev/PROJECT_ID/es-enterprise-repo/es-enterprise:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: production
            # Secrets via Secret Manager (nunca inline aqui)
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest
